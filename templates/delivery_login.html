{% extends "base.html" %}
{% block title %}Delivery Portal Login — KisanCard{% endblock %}

{% block content %}
<div class="auth-page" style="background:#f0fdf4;">
    <div class="auth-card" style="margin:auto; box-shadow:0 10px 25px rgba(34,197,94,0.15)">
        <div class="auth-header">
            <span class="auth-logo" style="background:#22c55e; color:white; border-radius:50%; padding:1rem;"><i class="fas fa-motorcycle"></i></span>
            <h2>Delivery Portal</h2>
            <p>Log in to manage your deliveries</p>
        </div>

        <form method="POST" action="{{ url_for('delivery_login') }}" class="auth-form" novalidate>
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter delivery ID or username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                    <button type="button" class="toggle-pass" onclick="togglePass('password')">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-full" style="background:#16a34a;">
                <i class="fas fa-sign-in-alt"></i> Enter Portal
            </button>
        </form>
        <p class="auth-switch" style="margin-top:1rem; text-align:center;">Not a delivery partner? <a href="{{ url_for('login') }}">User Login</a></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePass(id) {
    const input = document.getElementById(id);
    const icon = document.getElementById('toggleIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
